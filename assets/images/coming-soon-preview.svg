<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 2160" role="img" aria-labelledby="title desc">
  <title id="title">PocketPeek App Preview Coming Soon</title>
  <desc id="desc">A stylized phone mockup with coming soon text for the landing page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1512" />
      <stop offset="100%" stop-color="#0f1f19" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#36d399" />
      <stop offset="100%" stop-color="#60f0bd" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36" />
    </filter>
  </defs>

  <rect width="1080" height="2160" rx="120" fill="url(#bg)" />
  <circle cx="180" cy="220" r="180" fill="#36d399" opacity="0.22" filter="url(#soft)" />
  <circle cx="910" cy="1900" r="220" fill="#36d399" opacity="0.17" filter="url(#soft)" />

  <rect x="90" y="120" width="900" height="1920" rx="130" fill="#0a0f0d" stroke="#2e3d37" stroke-width="8" />
  <rect x="420" y="170" width="240" height="34" rx="17" fill="#18231f" />

  <g transform="translate(160 360)">
    <rect width="760" height="310" rx="40" fill="#121916" stroke="#25332d" />
    <text x="50%" y="42%" fill="#7be8bf" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="700" text-anchor="middle">PocketPeek</text>
    <text x="50%" y="65%" fill="#d7f9ec" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="800" text-anchor="middle">COMING SOON</text>
  </g>

  <g transform="translate(160 760)">
    <rect width="760" height="160" rx="30" fill="#121916" stroke="#25332d" />
    <text x="56" y="68" fill="#9db0a9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">Widgets</text>
    <text x="56" y="118" fill="#36d399" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Launching soon</text>
  </g>

  <g transform="translate(160 970)">
    <rect width="760" height="640" rx="40" fill="#121916" stroke="#25332d" />
    <rect x="56" y="68" width="648" height="12" rx="6" fill="#2a3c35" />
    <rect x="56" y="116" width="500" height="12" rx="6" fill="#2a3c35" />
    <rect x="56" y="220" width="170" height="270" rx="30" fill="#0f1513" stroke="#24342e" />
    <rect x="250" y="220" width="454" height="120" rx="24" fill="#0f1513" stroke="#24342e" />
    <rect x="250" y="370" width="454" height="120" rx="24" fill="#0f1513" stroke="#24342e" />
    <rect x="56" y="530" width="648" height="40" rx="20" fill="url(#accent)" opacity="0.85" />
  </g>

  <text x="540" y="1785" fill="#b8c8c2" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" text-anchor="middle">App screenshots will be added once the build is live.</text>
  <text x="540" y="1840" fill="#36d399" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" text-anchor="middle">Thanks for your patience.</text>
</svg>
